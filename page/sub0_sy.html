<script>

	$(function(){

		$(".system-btn").each(function(idx){
			
			const $this = $(this);
			$this.hover(
				function(){
					$this.next().animate({opacity: '1'}, 300);
				},
				function(){
					$this.next().animate({opacity: '0'}, 50);
				}
			);
		});

		$(window).on('load resize', function() {
			var windowWidth = $(window).width();
			
			$('.swap-img').each(function() {
					if (windowWidth < 768) {
							$(this).attr('src', $(this).data('mobile'));
					} else {
							$(this).attr('src', $(this).data('desktop'));
					}
				});
			});


      $("#allChk").click(function() {
        if($("#allChk").is(":checked")) $("input[name=chk]").prop("checked", true);
        else $("input[name=chk]").prop("checked", false);
      });

      $("input[name=chk]").click(function() {
        var total = $("input[name=chk]").length;
        var checked = $("input[name=chk]:checked").length;

        if(total != checked) $("#allChk").prop("checked", false);
        else $("#allChk").prop("checked", true); 
      });
